
name: Build libpython3.13 ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabi \
            python3.13 python3.13-dev \
            make wget autoconf libtool pkg-config

      - name: Build libffi for ARMv7
        run: |
          wget https://github.com/libffi/libffi/releases/download/v3.4.4/libffi-3.4.4.tar.gz
          tar xf libffi-3.4.4.tar.gz
          cd libffi-3.4.4
          ./configure \
            --host=arm-linux-gnueabi \
            --build=x86_64-linux-gnu \
            --prefix=$HOME/libffi_arm \
            CC=arm-linux-gnueabi-gcc
          make -j4
          make install

      - name: Download Python 3.13 source
        run: |
          wget https://www.python.org/ftp/python/3.13.0/Python-3.13.0.tgz
          tar xf Python-3.13.0.tgz

      - name: Create CONFIG_SITE
        run: |
          cat > $HOME/config.site << 'EOF'
          ac_cv_file__dev_ptmx=yes
          ac_cv_file__dev_ptc=no
          ac_cv_have_long_long_format=yes
          EOF

      - name: Cross-compile libpython3.13 for ARMv7
        run: |
          cd Python-3.13.0
          CONFIG_SITE=$HOME/config.site ./configure \
            --host=arm-linux-gnueabi \
            --build=x86_64-linux-gnu \
            --with-build-python=$(which python3.13) \
            CC=arm-linux-gnueabi-gcc \
            --enable-shared \
            --without-ensurepip \
            --disable-ipv6 \
            --with-system-ffi \
            --prefix=$HOME/python32_out \
            CFLAGS="-I$HOME/libffi_arm/include" \
            LDFLAGS="-L$HOME/libffi_arm/lib"
          make -j4
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpython3.13-armeabi-v7a
          path: ~/python32_out/lib/libpython3.13*.so*
